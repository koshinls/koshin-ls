<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KLS Config - Feedback</title>

    <link rel="stylesheet" href="../../style.css">

</head>

<body>

<header>

    <h1>💡 KLS Config - Feedback</h1>

    <nav>

        <a href="../../index.html">Home</a>

        <a href="../index.html">Mods</a>

        <a href="index.html">KLS Config</a>

    </nav>

</header>

<main>

    <div class="card">

        <h2>Feature Request</h2>

        <p>

            Have an idea? We'd love to hear it!

        </p>

        <form>

            <label>Title</label><br>

            <input type="text" placeholder="Feature title"><br><br>

            <label>Description</label><br>

            <textarea rows="10" placeholder="Describe your idea..."></textarea><br><br>

            <button type="submit">Submit</button>

        </form>

    </div>

    <div class="card">

        <h2>GitHub Discussions</h2>

        <p>

            Once available, suggestions can also be posted on GitHub.

        </p>

        <a class="button" href="#">Open GitHub</a>

    </div>

</main>

</body>

</html>
