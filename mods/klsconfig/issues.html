<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KLS Config - Issues</title>

    <link rel="stylesheet" href="../../style.css">

</head>

<body>

<header>

    <h1>🐞 KLS Config - Issues</h1>

    <nav>

        <a href="../../index.html">Home</a>

        <a href="../index.html">Mods</a>

        <a href="index.html">KLS Config</a>

    </nav>

</header>

<main>

    <div class="card">

        <h2>Report a Bug</h2>

        <p>

            Found a bug? Describe it below.

        </p>

        <form>

            <label>Title</label><br>

            <input type="text" placeholder="Short bug title"><br><br>

            <label>Description</label><br>

            <textarea rows="10" placeholder="Describe the bug..."></textarea><br><br>

            <button type="submit">Submit</button>

        </form>

    </div>

    <div class="card">

        <h2>GitHub Issues</h2>

        <p>

            When the GitHub repository is public, you can also report bugs there.

        </p>

        <a class="button" href="#">Open GitHub Issues</a>

    </div>

</main>

</body>

</html>
